{% extends "base.html" %}

{% block content %}
    <div class="list-group ">
        {% for item in products[0:10] %}
            <a href="/api/product/{{item["id"]}}" class="list-group-item list-group-item-action">
                <h3>{{item["name"]}}</h3>
                <p>{{item["description"]}}</p>
                <p class="id-display">product id: {{item["id"]}}</p>
            </a>
        {% endfor %}
    </div>

    <a href="/product_list" class="btn btn-primary">More to see!</a>
{% endblock %}
