{% extends "base.html" %}

{% block content %}
    <div class="list-group ">
        {% for item in products %}
            <a href="/view_product/{{item["id"]}}" class="list-group-item list-group-item-action">
                <h3>{{item["name"]}}</h3>
                <p>{{item["description"]}}</p>
            </a>
        {% endfor %}
    </div>
{% endblock %}
