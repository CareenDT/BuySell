{% extends "base.html" %}

{% block content %}
    <div class="list-group ">
        {% for item in products %}
            <a href="http://127.0.0.1:8080/api/product/{{item["id"]}}" class="list-group-item list-group-item-action">
                <h3>{{item["name"]}}</h3>
                <p>{{item["description"]}}</p>
                <p class="id-display">product id: {{item["id"]}}</p>
            </a>
        {% endfor %}
    </div>
{% endblock %}
