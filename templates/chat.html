{% extends "base.html" %}

{% block at_head_end %}
<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/chat_style.css') }}">
{% endblock %}

{% block content %}
<div class="chat-wrapper">
    <div class="chat-header">
        <h3>Чат</h3>
    </div>
    <ul id="board" class="chat-board"></ul>
    <div class="chat-input-bar">
        <input type="text" id="msgInput" placeholder="Введите сообщение..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">Отправить</button>
    </div>
</div>

<script>
    const board = document.getElementById("board")
    const header = document.getElementById("header")
    const msgInput = document.getElementById("msgInput")
    const sendBtn = document.getElementById("sendBtn")
    const warning_msg = document.createElement("div")
    const currentUserId = "{{ current_user.id }}"
    const chatId = "{{ chat_id }}"

    warning_msg.className = "alert alert-danger"
    warning_msg.role = "alert"
    warning_msg.innerHTML = "Проблема с подключением к серверу. Пожалуйста, подождите."
    warning_msg.align = "center"

    function formatTime(isoString) {
        if (!isoString) return ""
        const date = new Date(isoString)
        return date.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" })
    }

    function scrollToBottom() {
        board.scrollTop = board.scrollHeight
    }

    async function update() {
        try {
            const response = await fetch(`http://127.0.0.1:8080/api/chat/${chatId}`)
            const data = await response.json()

            board.replaceChildren()

            if (header.contains(warning_msg)) {
                header.removeChild(warning_msg)
            }

            data["contents"].forEach(element => {
                const wrapper = document.createElement("li")
                wrapper.className = element["sender"].toString() === currentUserId ? "chat-message-wrapper self" : "chat-message-wrapper other"

                const msg = document.createElement("div")
                msg.className = element["sender"].toString() === currentUserId ? "chat-message self" : "chat-message other"
                msg.innerHTML = `<span>${escapeHtml(element["text"])}</span><span class="msg-time">${formatTime(element["timestamp"])}</span>`

                wrapper.appendChild(msg)
                board.appendChild(wrapper)
            })

            scrollToBottom()
        } catch (error) {
            console.warn(error)
            if (!header.contains(warning_msg)) {
                header.appendChild(warning_msg)
            }
        }
    }

    async function sendMessage() {
        const text = msgInput.value.trim()
        if (!text) return

        sendBtn.disabled = true

        try {
            const response = await fetch(`http://127.0.0.1:8080/api/chat/${chatId}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: text, sender: currentUserId })
            })

            if (response.ok) {
                msgInput.value = ""
                await update()
            } else {
                alert("Ошибка отправки сообщения")
            }
        } catch (error) {
            console.warn(error)
            alert("Ошибка отправки сообщения")
        } finally {
            sendBtn.disabled = false
            msgInput.focus()
        }
    }

    function escapeHtml(text) {
        const div = document.createElement("div")
        div.textContent = text
        return div.innerHTML
    }

    msgInput.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            sendMessage()
        }
    })

    setInterval(update, 4000)
    update()
</script>
{% endblock %}
