{% extends "base.html" %}

{% block at_head_end %}
<link rel="stylesheet" type="text/css" href="{{ url_for("static", filename="css/chat_style.css") }}">
{% endblock %}

{% block content %}
<div class="chat-wrapper">
    <div class="chat-header">
        <h3>Чат</h3>
    </div>
    <ul id="board" class="chat-board"></ul>
    <div class="chat-input-bar">
        <input type="text" id="msgInput" placeholder="Введите сообщение..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">Отправить</button>
    </div>
</div>

<script>
    const board = document.getElementById("board");
    const header = document.getElementById("header");
    const chatId = parseInt("{{ chat_id }}");
    const currentUserId = parseInt("{{ current_user.id }}");
    
    const warning_msg = document.createElement("div");
    warning_msg.className = "alert alert-danger";
    warning_msg.role = "alert";
    warning_msg.innerHTML = "There was a problem connecting to our server. Please standby.";
    warning_msg.align = "center";
    
    const eventSource = new EventSource(`/chat/${chatId}/stream`);

    function appendMessage(text, senderId) {
        const wrapper = document.createElement("div");
        const msg = document.createElement("li");
        const side = senderId.toString() === currentUserId.toString() ? "self" : "other";

        wrapper.className = `chat-message-wrapper ${side}`;
        msg.className = `chat-message ${side}`;
        msg.textContent = text;

        wrapper.appendChild(msg);
        board.appendChild(wrapper);
        wrapper.scrollIntoView({ behavior: "smooth" });
    }
    
    eventSource.onmessage = (event) => {
        const data = JSON.parse(event.data);
        
        if (header.contains(warning_msg)) {
            header.removeChild(warning_msg);
        }
        
        appendMessage(data["text"], data["sender"]);
    };
    
    eventSource.onerror = (error) => {
        console.warn("SSE error:", error);
        
        if (!header.contains(warning_msg)) {
            header.appendChild(warning_msg);
        }
    };

    function sendMessage() {
        const input = document.getElementById("msgInput");
        const text = input.value.trim();
        
        if (!text) return;
        
        fetch(`/chat/${chatId}/send`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                text: text,
                sender: currentUserId
            })
        });
        
        input.value = "";
    }
    
    async function loadInitialMessages() {
        if (header.contains(warning_msg)) {
            header.removeChild(warning_msg);
        }
        try {
            const response = await fetch(`/chat/${chatId}`);
            const data = await response.json();
            
            board.replaceChildren();
            
            data["contents"].forEach(element => {
                appendMessage(element["text"], element["sender"]);
            });
        } catch (error) {
            console.warn(error);
            if (!header.contains(warning_msg)) {
                header.appendChild(warning_msg);
            }
        }
    }
    
    loadInitialMessages();
</script>
{% endblock %}
