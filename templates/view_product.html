{% extends "base.html" %}

{% block content %}
<div class="container mt-3">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h2>{{ product["name"] }}</h2>
                </div>
                <div class="card-body">
                    <h4>Description</h4>
                    <p>{{ product["description"] }}</p>
                    <h4>Price</h4>
                    <p>{{ product["pricing"] }} ₽</p>
                    <h4>Created</h4>
                    <p>{{ product["created_date"] }}</p>
                </div>
                <div class="card-footer">
                    <a href="/product_list" class="btn btn-secondary">Back</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
